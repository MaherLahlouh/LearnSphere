<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول الأدمن - LearnWithTaa</title>
    <link rel="stylesheet" href="../css/admin-login.css">
</head>
<body>
    <div class="admin-login-wrap">
        <div class="admin-login-card">
            <h1>لوحة تحكم الأدمن</h1>
            <p class="subtitle">تسجيل الدخول لإدارة المنصة</p>

            <form id="admin-login-form" class="admin-form">
                <div class="form-group">
                    <label for="admin-email">البريد الإلكتروني</label>
                    <input type="email" id="admin-email" name="email" required placeholder="أدخل البريد الإلكتروني" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="admin-password">كلمة المرور</label>
                    <input type="password" id="admin-password" name="password" required placeholder="أدخل كلمة المرور" autocomplete="current-password">
                </div>
                <p id="admin-login-error" class="error-msg" role="alert" aria-live="polite"></p>
                <button type="submit" class="btn-login" id="admin-login-btn">تسجيل الدخول</button>
            </form>

            <p class="back-link"><a href="/">العودة للصفحة الرئيسية</a></p>
        </div>
    </div>
    <script src="../js/admin-login.js"></script>
</body>
</html>

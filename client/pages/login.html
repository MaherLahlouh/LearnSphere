<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title">Login - عالمي الرقمي</title>
    <link rel="stylesheet" href="../css/login.css" />
    <link rel="manifest" href="../../manifest.json">
    <meta name="theme-color" content="#115879">
    <link rel="stylesheet" href="../css/toast-notifications.css">
    <link rel="stylesheet" href="../css/loading-animations.css">
    <link rel="stylesheet" href="../css/dark-mode.css">
    <link rel="stylesheet" href="../css/print-styles.css" media="print">
</head>
<body>
    <button class="lang-toggle" id="lang-btn">🌐 EN</button>

    <div class="background-animation">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
        <div class="floating-shape shape-4"></div>
        <div class="floating-shape shape-5"></div>
    </div>
    
    <div class="container">
        <div class="card-3d">
            <div class="brand-header">
                <h1>عالمي الرقمي</h1>
                <p class="tagline" id="welcome-text">Welcome Back, Learner!</p>
            </div>

            <form class="form-creative" id="login-form">
                <div class="input-creative">
                    <div class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </div>
                    <input type="email" id="email-input" placeholder="Email Address" required />
                    <div class="input-line"></div>
                </div>
                
                <div class="input-creative">
                    <div class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                    <input type="password" id="password-input" placeholder="Password" required />
                    <div class="input-line"></div>
                </div>
                
                <div class="form-extras">
                    <label class="remember-me">
                        <input type="checkbox" id="remember" />
                        <span class="custom-checkbox"></span>
                        <span class="checkbox-label">Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot?</a>
                </div>
                
                <button type="submit" class="btn-gradient" id="login-btn">
                    Login
                    <div class="btn-shine"></div>
                </button>
                
                <p class="signup-text">
                    Don't have an account? 
                    <a href="/sign_up.html" class="signup-link">Sign Up</a>
                </p>
            </form>
        </div>
    </div>

    <script type="module" src="../js/login.js"></script>
    <script src="../js/toast-notifications.js"></script>
    <script src="../js/dark-mode.js"></script>
    <script src="../js/mobile-gestures.js"></script>
    <button class="dark-mode-toggle" onclick="darkMode.toggle()" aria-label="Toggle dark mode">
      <i class="fas fa-moon" id="dark-mode-icon"></i>
    </button>
</body>
</html>

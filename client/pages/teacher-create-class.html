<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Class - Teacher Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/teacher-create-class.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-plus-circle"></i> Create New Class</h1>
            <a href="../pages/teacher_dashboard.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>

        <div class="card">
            <h2><i class="fas fa-info-circle"></i> Class Information</h2>
            <form id="class-form">
                <div class="form-group">
                    <label for="class-name">Class Name *</label>
                    <input type="text" id="class-name" placeholder="e.g., Grade 7 Math - Section A" required>
                </div>
                
                <div class="form-group">
                    <label for="class-grade">Grade Level *</label>
                    <select id="class-grade" required>
                        <option value="">Select Grade Level</option>
                        <option value="1">Grade 1</option>
                        <option value="2">Grade 2</option>
                        <option value="3">Grade 3</option>
                        <option value="4">Grade 4</option>
                        <option value="5">Grade 5</option>
                        <option value="6">Grade 6</option>
                        <option value="7">Grade 7</option>
                        <option value="8">Grade 8</option>
                        <option value="9">Grade 9</option>
                        <option value="10">Grade 10</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="class-subject">Subject *</label>
                    <input type="text" id="class-subject" placeholder="e.g., Mathematics, Science, Programming" required>
                </div>
                
                <div class="form-group">
                    <label for="class-description">Description</label>
                    <textarea id="class-description" placeholder="Brief description of the class..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="class-capacity">Maximum Capacity</label>
                    <input type="number" id="class-capacity" min="1" max="100" value="30">
                </div>
            </form>
        </div>

        <div class="card">
            <h2>
                <i class="fas fa-users"></i> Students 
                <span id="students-count" style="font-size: 14px; font-weight: 400; color: var(--text-medium);">(<span id="count">0</span> students)</span>
            </h2>
            <button class="add-student-btn" id="add-student-btn">
                <i class="fas fa-user-plus"></i> Add Student
            </button>
            
            <div class="student-list" id="student-list">
                <div class="empty-state" id="empty-state">
                    <i class="fas fa-users"></i>
                    <p>No students added yet. Click "Add Student" to start.</p>
                </div>
            </div>
        </div>

        <button class="submit-btn" id="submit-btn">Create Class</button>
        
        <div class="success-message" id="success-message">
            <i class="fas fa-check-circle"></i> Class created successfully!
        </div>
    </div>

    <div class="modal" id="add-student-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-user-plus"></i> Add Student</h3>
                <button class="close-modal" id="close-modal">&times;</button>
            </div>
            <form id="student-form">
                <div class="form-group">
                    <label for="student-first-name">First Name *</label>
                    <input type="text" id="student-first-name" placeholder="Enter first name" required>
                </div>
                
                <div class="form-group">
                    <label for="student-last-name">Last Name *</label>
                    <input type="text" id="student-last-name" placeholder="Enter last name" required>
                </div>
                
                <div class="form-group">
                    <label for="student-email">Email Address *</label>
                    <input type="email" id="student-email" placeholder="student@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="student-id">Student ID (Optional)</label>
                    <input type="text" id="student-id" placeholder="e.g., STU001">
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-add">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Student</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="../js/teacher-create-class.js"></script>
</body>
</html>

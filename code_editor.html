<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Code Editor - Learning Platform</title>
    <link rel="stylesheet" href="code_editor.css">
</head>
<body>
    <div class="container">
        <header class="editor-header">
            <h1>🚀 Live Code Editor</h1>
            <p>Write HTML, CSS, JavaScript, and Python - See results instantly!</p>
        </header>

        <div class="controls">
            <div class="tabs">
                <button class="tab-btn active" data-tab="html">📄 HTML</button>
                <button class="tab-btn" data-tab="css">🎨 CSS</button>
                <button class="tab-btn" data-tab="js">⚡ JavaScript</button>
                <button class="tab-btn" data-tab="python">🐍 Python</button>
            </div>
            <div class="action-buttons">
                <button id="runBtn" class="btn btn-primary">▶️ Run Code</button>
                <button id="clearBtn" class="btn btn-secondary">🗑️ Clear</button>
                <button id="saveBtn" class="btn btn-success">💾 Save</button>
                <button id="loadBtn" class="btn btn-info">📂 Load</button>
            </div>
        </div>

        <div class="editor-container">
            <div class="editor-panel">
                <div class="editor-wrapper">
                    <div class="editor-section active" id="html-editor">
                        <div class="editor-label">
                            <span>HTML</span>
                            <span class="line-numbers-toggle">
                                <input type="checkbox" id="htmlLineNumbers" checked disabled>
                                <label for="htmlLineNumbers">Line Numbers</label>
                            </span>
                        </div>
                        <textarea id="html-code" class="code-input" spellcheck="false"><!DOCTYPE html>
<html>
<head>
    <title>My Page</title>
</head>
<body>
    <h1>Hello World!</h1>
    <p>Start coding here...</p>
</body>
</html></textarea>
                    </div>

                    <div class="editor-section" id="css-editor">
                        <div class="editor-label">
                            <span>CSS</span>
                            <span class="line-numbers-toggle">
                                <input type="checkbox" id="cssLineNumbers" checked disabled>
                                <label for="cssLineNumbers">Line Numbers</label>
                            </span>
                        </div>
                        <textarea id="css-code" class="code-input" spellcheck="false">body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
}

h1 {
    color: #ffd700;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

p {
    font-size: 18px;
}</textarea>
                    </div>

                    <div class="editor-section" id="js-editor">
                        <div class="editor-label">
                            <span>JavaScript</span>
                            <span class="line-numbers-toggle">
                                <input type="checkbox" id="jsLineNumbers" checked disabled>
                                <label for="jsLineNumbers">Line Numbers</label>
                            </span>
                        </div>
                        <textarea id="js-code" class="code-input" spellcheck="false">// Your JavaScript code here
console.log('Hello from JavaScript!');

// Example: Add click event
document.addEventListener('DOMContentLoaded', function() {
    const h1 = document.querySelector('h1');
    if (h1) {
        h1.addEventListener('click', function() {
            alert('You clicked the heading!');
        });
    }
});</textarea>
                    </div>

                    <div class="editor-section" id="python-editor">
                        <div class="editor-label">
                            <span>Python</span>
                            <span class="line-numbers-toggle">
                                <input type="checkbox" id="pythonLineNumbers" checked disabled>
                                <label for="pythonLineNumbers">Line Numbers</label>
                            </span>
                        </div>
                        <textarea id="python-code" class="code-input" spellcheck="false"># Python Code
print('Hello from Python!')

# Variables
name = 'Student'
age = 15

# Function
def greet(person):
    return f'Hello, {person}!'

# Call function
print(greet(name))

# Loop
for i in range(5):
    print(f'Count: {i}')</textarea>
                    </div>
                </div>
            </div>

            <div class="output-panel">
                <div class="output-header">
                    <span>📺 Output</span>
                    <button id="refreshBtn" class="btn-small">🔄 Refresh</button>
                </div>
                <iframe id="output-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups"></iframe>
                <div class="console-panel">
                    <div class="console-header">
                        <span>📋 Console</span>
                        <button id="clearConsole" class="btn-small">Clear</button>
                    </div>
                    <div id="console-output"></div>
                </div>
            </div>
        </div>

        <div class="back-link">
            <a href="dashboard.html" class="btn btn-back">← Back to Dashboard</a>
        </div>
    </div>

    <!-- Skulpt CDN - NO TRAILING SPACES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/skulpt/1.2.0/skulpt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/skulpt/1.2.0/skulpt-stdlib.js"></script>

    <!-- Main JS -->
    <script src="code_editor.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Code Editor with Python</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .editor-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .editor-header h1 { font-size: 2.5em; margin-bottom: 10px; }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            flex-wrap: wrap;
            gap: 15px;
        }

        .tabs { display: flex; gap: 10px; }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .tab-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .tab-btn.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }

        .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-primary { background: #28a745; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-success { background: #17a2b8; color: white; }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: calc(100vh - 300px);
            min-height: 600px;
        }

        .editor-panel {
            border-right: 2px solid #e9ecef;
            display: flex;
            flex-direction: column;
        }

        .editor-wrapper { flex: 1; overflow: hidden; }

        .editor-section {
            display: none;
            height: 100%;
            flex-direction: column;
        }

        .editor-section.active { display: flex; }

        .editor-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            font-weight: 600;
            color: #495057;
        }

        .code-input {
            flex: 1;
            width: 100%;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            border: none;
            resize: none;
            background: #282c34;
            color: #abb2bf;
            outline: none;
            tab-size: 4;
        }

        .output-panel {
            display: flex;
            flex-direction: column;
            background: #f8f9fa;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #e9ecef;
            border-bottom: 1px solid #dee2e6;
            font-weight: 600;
            color: #495057;
        }

        #output-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }

        .console-panel {
            height: 150px;
            border-top: 2px solid #dee2e6;
            display: flex;
            flex-direction: column;
        }

        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            background: #343a40;
            color: white;
            font-weight: 600;
            font-size: 0.9em;
        }

        #console-output {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px;
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        .console-log { margin: 5px 0; padding: 5px; border-left: 3px solid #007acc; background: #252526; }
        .console-error { margin: 5px 0; padding: 5px; border-left: 3px solid #f44336; background: #2d1f1f; color: #f48771; }

        .loading-status {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px 50px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 10000;
            display: none;
        }

        .loading-status.show { display: block; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @media (max-width: 1024px) {
            .editor-container { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
            .editor-panel { border-right: none; border-bottom: 2px solid #e9ecef; }
        }
    </style>
</head>
<body>
    <div class="loading-status" id="loadingStatus">
        <div class="spinner"></div>
        <p>Loading Python environment...</p>
    </div>

    <div class="container">
        <header class="editor-header">
            <h1>🚀 Advanced Code Editor</h1>
            <p>HTML, CSS, JavaScript, and Python - All in one!</p>
        </header>

        <div class="controls">
            <div class="tabs">
                <button class="tab-btn active" data-tab="html">📄 HTML</button>
                <button class="tab-btn" data-tab="css">🎨 CSS</button>
                <button class="tab-btn" data-tab="js">⚡ JS</button>
                <button class="tab-btn" data-tab="python">🐍 Python</button>
            </div>
            <div class="action-buttons">
                <button id="runBtn" class="btn btn-primary">▶️ Run</button>
                <button id="clearBtn" class="btn btn-secondary">🗑️ Clear</button>
                <button id="saveBtn" class="btn btn-success">💾 Save</button>
            </div>
        </div>

        <div class="editor-container">
            <div class="editor-panel">
                <div class="editor-wrapper">
                    <div class="editor-section active" id="html-editor">
                        <div class="editor-label"><span>HTML</span></div>
                        <textarea id="html-code" class="code-input" spellcheck="false"><!DOCTYPE html>
<html>
<head><title>My Page</title></head>
<body>
    <h1>Hello World!</h1>
    <p>Start coding here...</p>
</body>
</html></textarea>
                    </div>

                    <div class="editor-section" id="css-editor">
                        <div class="editor-label"><span>CSS</span></div>
                        <textarea id="css-code" class="code-input" spellcheck="false">body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
}

h1 {
    color: #ffd700;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}</textarea>
                    </div>

                    <div class="editor-section" id="js-editor">
                        <div class="editor-label"><span>JavaScript</span></div>
                        <textarea id="js-code" class="code-input" spellcheck="false">// JavaScript code
console.log('Hello from JavaScript!');

const numbers = [1, 2, 3, 4, 5];
console.log('Sum:', numbers.reduce((a,b) => a+b));</textarea>
                    </div>

                    <div class="editor-section" id="python-editor">
                        <div class="editor-label"><span>Python</span></div>
                        <textarea id="python-code" class="code-input" spellcheck="false"># Python code
print('Hello from Python!')

# Variables
name = 'Student'
age = 15
print(f'Name: {name}, Age: {age}')

# List
numbers = [1, 2, 3, 4, 5]
print(f'Sum: {sum(numbers)}')

# Loop
for i in range(5):
    print(f'Count: {i}')</textarea>
                    </div>
                </div>
            </div>

            <div class="output-panel">
                <div class="output-header"><span>📺 Output</span></div>
                <iframe id="output-frame"></iframe>
                <div class="console-panel">
                    <div class="console-header"><span>📋 Console</span></div>
                    <div id="console-output"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script>
        let pyodide = null;
        let pyodideReady = false;

        const htmlCode = document.getElementById('html-code');
        const cssCode = document.getElementById('css-code');
        const jsCode = document.getElementById('js-code');
        const pythonCode = document.getElementById('python-code');
        const outputFrame = document.getElementById('output-frame');
        const consoleOutput = document.getElementById('console-output');
        const tabs = document.querySelectorAll('.tab-btn');
        const editorSections = document.querySelectorAll('.editor-section');
        const runBtn = document.getElementById('runBtn');
        const clearBtn = document.getElementById('clearBtn');
        const saveBtn = document.getElementById('saveBtn');
        const loadingStatus = document.getElementById('loadingStatus');

        let currentTab = 'html';
        let autoRunTimeout;

        // Load Pyodide
        async function loadPyodide() {
            loadingStatus.classList.add('show');
            try {
                pyodide = await loadPyodide();
                pyodideReady = true;
                loadingStatus.classList.remove('show');
                logToConsole('Python environment loaded! ✅', 'log');
            } catch (error) {
                loadingStatus.classList.remove('show');
                logToConsole('Failed to load Python: ' + error, 'error');
            }
        }

        // Start loading Python in background
        loadPyodide();

        // Tab switching
        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                currentTab = this.getAttribute('data-tab');
                tabs.forEach(t => t.classList.remove('active'));
                editorSections.forEach(s => s.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(`${currentTab}-editor`).classList.add('active');
                if (currentTab !== 'python') updateOutput();
            });
        });

        // Auto-run for web languages
        [htmlCode, cssCode, jsCode].forEach(editor => {
            editor.addEventListener('input', () => {
                clearTimeout(autoRunTimeout);
                autoRunTimeout = setTimeout(() => {
                    if (currentTab !== 'python') updateOutput();
                }, 1000);
            });
        });

        runBtn.addEventListener('click', updateOutput);

        clearBtn.addEventListener('click', () => {
            if (confirm('Clear all code?')) {
                htmlCode.value = '<!DOCTYPE html>\n<html>\n<head><title>My Page</title></head>\n<body>\n    <h1>Hello!</h1>\n</body>\n</html>';
                cssCode.value = 'body { font-family: Arial; margin: 20px; }';
                jsCode.value = 'console.log("Hello!");';
                pythonCode.value = 'print("Hello from Python!")';
                updateOutput();
            }
        });

        saveBtn.addEventListener('click', () => {
            localStorage.setItem('savedCode', JSON.stringify({
                html: htmlCode.value,
                css: cssCode.value,
                js: jsCode.value,
                python: pythonCode.value
            }));
            showMessage('Saved! ✅');
        });

        function updateOutput() {
            consoleOutput.innerHTML = '';
            if (currentTab === 'python') {
                runPython();
            } else {
                runWeb();
            }
        }

        async function runPython() {
            if (!pyodideReady) {
                logToConsole('Python is still loading... Please wait.', 'error');
                return;
            }

            const code = pythonCode.value;
            const iframe = outputFrame.contentDocument || outputFrame.contentWindow.document;
            iframe.open();
            iframe.write('<html><body style="font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4;"><h3 style="color: #4CAF50;">Python Output:</h3><pre id="python-output"></pre></body></html>');
            iframe.close();

            try {
                pyodide.setStdout({
                    batched: (text) => {
                        logToConsole(text, 'log');
                        const pythonOutput = iframe.getElementById('python-output');
                        if (pythonOutput) pythonOutput.textContent += text + '\n';
                    }
                });

                await pyodide.runPythonAsync(code);
                logToConsole('✅ Python executed successfully', 'log');
            } catch (error) {
                logToConsole('Python Error: ' + error, 'error');
            }
        }

        function runWeb() {
            const html = htmlCode.value;
            const css = `<style>${cssCode.value}</style>`;
            const js = jsCode.value;

            const content = `<!DOCTYPE html><html><head><meta charset="UTF-8">${css}</head><body>${html}<script>(function() {
                const originalLog = console.log;
                const originalError = console.error;
                console.log = function(...args) {
                    originalLog.apply(console, args);
                    window.parent.postMessage({ type: 'log', message: args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(' ') }, '*');
                };
                console.error = function(...args) {
                    originalError.apply(console, args);
                    window.parent.postMessage({ type: 'error', message: args.map(arg => String(arg)).join(' ') }, '*');
                };
                window.addEventListener('error', e => window.parent.postMessage({ type: 'error', message: e.message }, '*'));
                try { ${js} } catch(e) { console.error(e.message); }
            })();<\/script></body></html>`;

            const iframe = outputFrame.contentDocument || outputFrame.contentWindow.document;
            iframe.open();
            iframe.write(content);
            iframe.close();
        }

        window.addEventListener('message', e => {
            if (e.data && e.data.type) {
                logToConsole(e.data.message, e.data.type);
            }
        });

        function logToConsole(message, type = 'log') {
            const entry = document.createElement('div');
            entry.className = `console-${type}`;
            entry.textContent = `[${type.toUpperCase()}] ${message}`;
            consoleOutput.appendChild(entry);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        function showMessage(msg) {
            const div = document.createElement('div');
            div.style.cssText = 'position: fixed; top: 20px; right: 20px; padding: 15px 25px; background: #28a745; color: white; border-radius: 8px; z-index: 10000;';
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2000);
        }

        // Load saved code
        const saved = localStorage.getItem('savedCode');
        if (saved) {
            const code = JSON.parse(saved);
            htmlCode.value = code.html;
            cssCode.value = code.css;
            jsCode.value = code.js;
            pythonCode.value = code.python;
        }

        updateOutput();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="dashboard_title">Dashboard - Taa Academy</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#115879">
  <link rel="stylesheet" href="toast-notifications.css">
  <link rel="stylesheet" href="loading-animations.css">
  <link rel="stylesheet" href="dark-mode.css">
  <link rel="stylesheet" href="mobile-menu.css">
  <link rel="stylesheet" href="print-styles.css" media="print">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    :root {
      --primary-blue: #115879;
      --primary-yellow: #fcd40a;
      --bg-gradient-start: #f8fafc;
      --bg-gradient-end: #e8f1f8;
      --card-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
      --card-shadow-hover: 0 20px 40px rgba(17, 88, 121, 0.15);
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border-color: #e2e8f0;
      --success-green: #10b981;
      --warning-orange: #f59e0b;
    }

    body {
      background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
      min-height: 100vh;
      color: var(--text-primary);
      transition: direction 0.3s ease;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(252, 212, 10, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(17, 88, 121, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body.rtl {
      direction: rtl;
    }

    .dashboard-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-nav {
      background: white;
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-badge {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary-yellow) 0%, #e6c009 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary-blue);
      font-weight: 800;
      font-size: 1.2rem;
      box-shadow: 0 4px 12px rgba(252, 212, 10, 0.3);
    }

    .logo-text h3 {
      font-size: 1.3rem;
      color: var(--primary-blue);
      font-weight: 700;
      margin-bottom: 0.1rem;
    }

    .logo-text p {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.5rem 1rem;
      background: var(--bg-gradient-start);
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary-blue), #1a7599);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .user-details h4 {
      font-size: 0.9rem;
      color: var(--text-primary);
      font-weight: 600;
    }

    .lang-btn {
      background: white;
      border: 1.5px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .lang-btn:hover {
      background: var(--primary-blue);
      color: white;
      border-color: var(--primary-blue);
      transform: translateY(-1px);
    }

    .logout-btn {
      background: white;
      border: 1.5px solid var(--border-color);
      color: var(--text-secondary);
      padding: 0.6rem 1rem;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logout-btn:hover {
      background: #fee;
      border-color: #ef4444;
      color: #ef4444;
      transform: translateY(-1px);
    }

    .main-content {
      flex: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 3rem 2.5rem;
      width: 100%;
    }

    .dashboard-header {
      margin-bottom: 3rem;
    }

    .dashboard-header h1 {
      font-size: 2.5rem;
      color: var(--text-primary);
      margin-bottom: 0.8rem;
      font-weight: 800;
    }

    .dashboard-header p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: var(--card-shadow);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--card-shadow-hover);
    }

    .stat-icon {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .stat-icon.yellow {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      color: #f59e0b;
    }

    .stat-icon.blue {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      color: #3b82f6;
    }

    .stat-icon.green {
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
      color: #10b981;
    }

    .stat-info h3 {
      font-size: 1.8rem;
      color: var(--text-primary);
      font-weight: 700;
      margin-bottom: 0.2rem;
    }

    .stat-info p {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .section-header {
      margin-bottom: 2rem;
    }

    .section-header h2 {
      font-size: 1.8rem;
      color: var(--text-primary);
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .section-header p {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .grades-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
    }

    .grade-card {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: var(--card-shadow);
      border: 1px solid var(--border-color);
      position: relative;
      overflow: hidden;
    }

    .grade-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--primary-yellow), var(--primary-blue));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }

    body.rtl .grade-card::before {
      transform-origin: right;
    }

    .grade-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--card-shadow-hover);
      border-color: transparent;
    }

    .grade-card:hover::before {
      transform: scaleX(1);
    }

   .grade-card-header {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 1.5rem;
    }

    .grade-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary-yellow) 0%, #e6c009 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary-blue);
      font-size: 1.8rem;
      font-weight: 800;
      box-shadow: 0 8px 16px rgba(252, 212, 10, 0.3);
      flex-shrink: 0;
    }

    .grade-info h2 {
      font-size: 1.6rem;
      color: var(--text-primary);
      margin-bottom: 0.3rem;
      font-weight: 700;
    }

    .grade-badge {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      color: #1e40af;
      font-size: 0.75rem;
      border-radius: 20px;
      font-weight: 600;
    }

    .grade-card p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .grade-progress {
      margin-bottom: 1rem;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .progress-header span {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .progress-bar-container {
      height: 8px;
      background: #e2e8f0;
      border-radius: 20px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--success-green), #34d399);
      border-radius: 20px;
      transition: width 0.6s ease;
    }

    .grade-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid var(--border-color);
    }

    .lesson-count {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 500;
    }

    .start-btn {
      background: var(--primary-blue);
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .start-btn:hover {
      background: #0d3f54;
      transform: translateX(4px);
    }

    body.rtl .start-btn:hover {
      transform: translateX(-4px);
    }

    @media (max-width: 1024px) {
      .nav-container {
        padding: 1rem 1.5rem;
      }

      .main-content {
        padding: 2rem 1.5rem;
      }

      .grades-grid {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.5rem;
      }
    }

    @media (max-width: 768px) {
      .user-info {
        display: none;
      }

      .dashboard-header h1 {
        font-size: 2rem;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .grades-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      .nav-container {
        flex-wrap: wrap;
        gap: 1rem;
      }

      .logo-section {
        order: 1;
      }

      .nav-actions {
        order: 2;
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard-wrapper">
    <nav class="top-nav">
      <div class="nav-container">
        <div class="logo-section">
        <div class="logo-text">
          <h3>عالمي الرقمي</h3>
            <p data-i18n="student_portal">Student Portal</p>
        </div>
      </div>
        
        <div class="nav-actions">
          <div class="user-info">
            <div class="user-avatar" id="userAvatar">S</div>
            <div class="user-details">
              <h4 id="userName">Student Name</h4>
            </div>
          </div>
          <button class="lang-btn" id="langToggle">
            <i class="fas fa-globe"></i>
            <span data-i18n="lang_btn">EN</span>
          </button>
          <button class="logout-btn" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i>
            <span data-i18n="logout">Logout</span>
          </button>
        </div>
      </div>
    </nav>

    <main class="main-content">
      <div class="dashboard-header">
        <h1 data-i18n="welcome_dashboard">Welcome Back, Student!</h1>
        <p data-i18n="dashboard_subtitle">Continue your learning journey and explore new coding concepts</p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon yellow">
            <i class="fas fa-book-open"></i>
          </div>
          <div class="stat-info">
            <h3 id="lessonsCompleted">12</h3>
            <p data-i18n="lessons_completed">Lessons Completed</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue">
            <i class="fas fa-trophy"></i>
          </div>
          <div class="stat-info">
            <h3 id="achievementsEarned">8</h3>
            <p data-i18n="achievements">Achievements Earned</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">
            <i class="fas fa-chart-line"></i>
          </div>
          <div class="stat-info">
            <h3 id="studyStreak">15</h3>
            <p data-i18n="day_streak">Day Streak</p>
          </div>
        </div>
      </div>

      <div class="section-header">
        <h2 data-i18n="your_grades">Your Grade Level</h2>
        <p data-i18n="select_grade_text">Select a unit to access lessons and activities</p>
      </div>

      <div class="grades-grid" id="gradesContainer"></div>
    </main>
  </div>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";

  let translations = {};
  let currentLang = localStorage.getItem('userLanguage') || 'en';
  let currentUser = null;
  let userGrade = null;

  // ✅ Updated: Added grades 7-10
  const gradeData = {
    '1': { title: 'Grade 1', badge: 'Beginner', desc: 'Introduction to logic and simple commands', lessons: 12, progress: 0 },
    '2': { title: 'Grade 2', badge: 'Beginner', desc: 'Sequences, loops, and basic problem solving', lessons: 14, progress: 0 },
    '3': { title: 'Grade 3', badge: 'Intermediate', desc: 'Events, conditions, and interactive stories', lessons: 16, progress: 45 },
    '4': { title: 'Grade 4', badge: 'Intermediate', desc: 'Functions, variables, and mini-games', lessons: 18, progress: 0 },
    '5': { title: 'Grade 5', badge: 'Advanced', desc: 'Algorithms, debugging, and teamwork projects', lessons: 20, progress: 0 },
    '6': { title: 'Grade 6', badge: 'Advanced', desc: 'Advanced logic, robotics, and real-world apps', lessons: 22, progress: 0 },
    '7': { title: 'Grade 7', badge: 'Advanced', desc: 'Programming fundamentals and web development', lessons: 24, progress: 0 },
    '8': { title: 'Grade 8', badge: 'Expert', desc: 'Data structures and advanced algorithms', lessons: 26, progress: 0 },
    '9': { title: 'Grade 9', badge: 'Expert', desc: 'Object-oriented programming and databases', lessons: 28, progress: 0 },
    '10': { title: 'Grade 10', badge: 'Expert', desc: 'Full-stack development and final projects', lessons: 30, progress: 0 }
  };

  async function loadTranslations(lang) {
    try {
      if (lang === 'ar') {
        translations = {
          "dashboard_title": "لوحة التحكم - أكاديمية تاء",
          "student_portal": "بوابة الطالب",
          "lang_btn": "🌐 AR",
          "logout": "تسجيل الخروج",
          "welcome_dashboard": "مرحباً بك في عالمي الرقمي",
          "dashboard_subtitle": "واصل رحلتك التعليمية واستكشف مفاهيم برمجية جديدة",
          "lessons_completed": "الدروس المكتملة",
          "achievements": "الإنجازات المكتسبة",
          "day_streak": "سلسلة الأيام",
          "your_grades": "صفك الدراسي",
          "select_grade_text": "اختر وحدة للوصول إلى الدروس والأنشطة",
          "grade1": "الصف 1",
          "grade2": "الصف 2",
          "grade3": "الصف 3",
          "grade4": "الصف 4",
          "grade5": "الصف 5",
          "grade6": "الصف 6",
          "grade7": "الصف 7",
          "grade8": "الصف 8",
          "grade9": "الصف 9",
          "grade10": "الصف 10",
          "desc_grade1": "مقدمة إلى المنطق والأوامر البسيطة",
          "desc_grade2": "التسلسلات، الحلقات، وحل المشكلات الأساسية",
          "desc_grade3": "الأحداث، الشروط، والقصص التفاعلية",
          "desc_grade4": "الدوال، المتغيرات، والألعاب الصغيرة",
          "desc_grade5": "الخوارزميات، تصحيح الأخطاء، ومشاريع العمل الجماعي",
          "desc_grade6": "المنطق المتقدم، الروبوتات، والتطبيقات الواقعية",
          "desc_grade7": "أساسيات البرمجة وتطوير الويب",
          "desc_grade8": "هياكل البيانات والخوارزميات المتقدمة",
          "desc_grade9": "البرمجة الكائنية وقواعد البيانات",
          "desc_grade10": "تطوير التطبيقات الكاملة والمشاريع النهائية",
          "beginner": "مبتدئ",
          "intermediate": "متوسط",
          "advanced": "متقدم",
          "expert": "خبير",
          "progress": "التقدم",
          "lessons": "دروس",
          "start": "ابدأ",
          "continue": "متابعة",
          "logout_confirm": "هل أنت متأكد أنك تريد تسجيل الخروج؟"
        };
      } else {
        translations = {
          "dashboard_title": "Dashboard - Taa Academy",
          "student_portal": "Student Portal",
          "lang_btn": "🌐 EN",
          "logout": "Logout",
          "welcome_dashboard": "Welcome to عالمي الرقمي",
          "dashboard_subtitle": "Continue your learning journey and explore new coding concepts",
          "lessons_completed": "Lessons Completed",
          "achievements": "Achievements Earned",
          "day_streak": "Day Streak",
          "your_grades": "Your Grade Level",
          "select_grade_text": "Select a unit to access lessons and activities",
          "grade1": "Grade 1",
          "grade2": "Grade 2",
          "grade3": "Grade 3",
          "grade4": "Grade 4",
          "grade5": "Grade 5",
          "grade6": "Grade 6",
          "grade7": "Grade 7",
          "grade8": "Grade 8",
          "grade9": "Grade 9",
          "grade10": "Grade 10",
          "desc_grade1": "Introduction to logic and simple commands",
          "desc_grade2": "Sequences, loops, and basic problem solving",
          "desc_grade3": "Events, conditions, and interactive stories",
          "desc_grade4": "Functions, variables, and mini-games",
          "desc_grade5": "Algorithms, debugging, and teamwork projects",
          "desc_grade6": "Advanced logic, robotics, and real-world apps",
          "desc_grade7": "Programming fundamentals and web development",
          "desc_grade8": "Data structures and advanced algorithms",
          "desc_grade9": "Object-oriented programming and databases",
          "desc_grade10": "Full-stack development and final projects",
          "beginner": "Beginner",
          "intermediate": "Intermediate",
          "advanced": "Advanced",
          "expert": "Expert",
          "progress": "Progress",
          "lessons": "Lessons",
          "start": "Start",
          "continue": "Continue",
          "logout_confirm": "Are you sure you want to log out?"
        };
      }
      applyTranslations();
      updatePageDirection(lang);
      currentLang = lang;
      localStorage.setItem('userLanguage', lang);
    } catch (error) {
      console.error('Error loading translations:', error);
    }
  }

  function applyTranslations() {
    document.querySelectorAll('[data-i18n]').forEach(element => {
      const key = element.getAttribute('data-i18n');
      if (translations[key]) {
        if (element.tagName === 'INPUT' || element.tagName === 'TEXTAREA') {
          element.placeholder = translations[key];
        } else if (element.tagName === 'TITLE') {
          element.textContent = translations[key];
        } else {
          element.innerHTML = translations[key];
        }
      }
    });
    document.querySelector('#langToggle span').textContent = translations.lang_btn || (currentLang === 'en' ? '🌐 EN' : '🌐 AR');
  }

  function updatePageDirection(lang) {
    if (lang === 'ar') {
      document.body.classList.add('rtl');
      document.documentElement.setAttribute('lang', 'ar');
      document.documentElement.setAttribute('dir', 'rtl');
    } else {
      document.body.classList.remove('rtl');
      document.documentElement.setAttribute('lang', 'en');
      document.documentElement.setAttribute('dir', 'ltr');
    }
  }

  function renderUserGrade(grade) {
    const container = document.getElementById('gradesContainer');
    const data = gradeData[grade];
    
    if (!data) {
      container.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">Grade information not found.</p>';
      return;
    }

    const badgeClass = data.badge.toLowerCase();
    const progressPercent = data.progress;
    const buttonText = progressPercent > 0 ? (translations.continue || 'Continue') : (translations.start || 'Start');

    container.innerHTML = `
      <div class="grade-card" data-grade="${grade}">
        <div class="grade-card-header">
          <div class="grade-icon">${grade}</div>
          <div class="grade-info">
            <h2 data-i18n="grade${grade}">${translations['grade' + grade] || data.title}</h2>
            <span class="grade-badge" data-i18n="${badgeClass}">${translations[badgeClass] || data.badge}</span>
          </div>
        </div>
        <p data-i18n="desc_grade${grade}">${translations['desc_grade' + grade] || data.desc}</p>
        <div class="grade-progress">
          <div class="progress-header">
            <span data-i18n="progress">${translations.progress || 'Progress'}</span>
            <span>${progressPercent}%</span>
          </div>
          <div class="progress-bar-container">
            <div class="progress-bar" style="width: ${progressPercent}%"></div>
          </div>
        </div>
        <div class="grade-footer">
          <div class="lesson-count">
            <i class="fas fa-book"></i>
            <span>${data.lessons} <span data-i18n="lessons">${translations.lessons || 'Lessons'}</span></span>
          </div>
          <button class="start-btn">${buttonText}</button>
        </div>
      </div>
    `;

    document.querySelector('.start-btn').addEventListener('click', () => {
      window.location.href = `units.html?grade=${grade}`;
    });
  }

  async function loadUserData(userId) {
    try {
      const userDoc = await getDoc(doc(db, "users", userId));
      if (userDoc.exists()) {
        const userData = userDoc.data();
        document.getElementById('userName').textContent = `${userData.firstName} ${userData.lastName}`;
        document.getElementById('userAvatar').textContent = userData.firstName.charAt(0).toUpperCase();
        
        userGrade = userData.grade || localStorage.getItem('userGrade') || '1';
        localStorage.setItem('userGrade', userGrade);
        renderUserGrade(userGrade);
        
      } else {
        document.getElementById('userName').textContent = 'User';
        document.getElementById('userAvatar').textContent = 'U';
        userGrade = localStorage.getItem('userGrade') || '1';
        renderUserGrade(userGrade);
      }
    } catch (error) {
      console.error('Error loading user data:', error);
      document.getElementById('userName').textContent = 'User';
      document.getElementById('userAvatar').textContent = 'U';
      userGrade = localStorage.getItem('userGrade') || '1';
      renderUserGrade(userGrade);
    }
  }

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      loadUserData(user.uid);
    } else {
      userGrade = localStorage.getItem('userGrade') || '1';
      renderUserGrade(userGrade);
    }
  });

  document.getElementById('langToggle').addEventListener('click', () => {
    const newLang = currentLang === 'en' ? 'ar' : 'en';
    loadTranslations(newLang);
    if (userGrade) {
      renderUserGrade(userGrade);
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    const confirmMessage = translations.logout_confirm || 'Are you sure you want to log out?';
    if (confirm(confirmMessage)) {
      try {
        await auth.signOut();
        localStorage.removeItem('userGrade');
        window.location.href = 'landing_page.html';
      } catch (error) {
        console.error('Logout error:', error);
        alert('Error logging out. Please try again.');
      }
    }
  });

  loadTranslations(currentLang);
  </script>
  <!-- Enhancement JavaScript Files -->
  <script src="toast-notifications.js"></script>
  <script src="keyboard-shortcuts.js"></script>
  <script src="dark-mode.js"></script>
  <script src="analytics.js"></script>
  <script src="accessibility.js"></script>
  <script src="mobile-gestures.js"></script>
  <script src="mobile-menu.js"></script>
  <!-- Dark Mode Toggle Button -->
  <button class="dark-mode-toggle" onclick="darkMode.toggle()" aria-label="Toggle dark mode">
    <i class="fas fa-moon" id="dark-mode-icon"></i>
  </button>
  <script>
    // Update dark mode icon
    window.addEventListener('darkModeChanged', (e) => {
      const icon = document.getElementById('dark-mode-icon');
      if (icon) {
        icon.className = e.detail.isDark ? 'fas fa-sun' : 'fas fa-moon';
      }
    });
    // Initialize dark mode icon
    if (document.getElementById('dark-mode-icon')) {
      document.getElementById('dark-mode-icon').className = darkMode.isEnabled() ? 'fas fa-sun' : 'fas fa-moon';
    }
  </script>
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('Service Worker registered'))
          .catch(err => console.log('Service Worker registration failed'));
      });
    }
  </script>
</body>

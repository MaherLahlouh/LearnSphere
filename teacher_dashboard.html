<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Students</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-yellow: #fcd40a;
            --primary-blue: #87abbc;
            --primary-teal: #115879;
            --light-bg: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1a1a1a;
            --text-medium: #4a5568;
            --text-light: #718096;
            --border: #e2e8f0;
            --card-shadow: 0 4px 12px rgba(17, 88, 121, 0.1);
            --sidebar-width: 260px;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-dark);
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--primary-teal);
            color: white;
            padding: 24px 0;
            height: 100vh;
            position: fixed;
            box-shadow: var(--card-shadow);
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .logo {
            display: flex;
            align-items: center;
            padding: 0 24px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo i {
            font-size: 28px;
            margin-right: 12px;
            color: var(--primary-yellow);
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .nav-links {
            padding: 24px 0;
            flex: 1;
        }

        .nav-item {
            padding: 14px 24px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid var(--primary-yellow);
        }

        .nav-item i {
            font-size: 18px;
            margin-right: 16px;
            width: 24px;
            text-align: center;
            color: var(--primary-yellow);
        }

        .logout-section {
            padding: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logout-btn {
            width: 100%;
            padding: 14px 24px;
            background: rgba(252, 212, 10, 0.15);
            border: 2px solid var(--primary-yellow);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--primary-yellow);
            color: var(--primary-teal);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(252, 212, 10, 0.3);
        }

        .logout-btn i {
            font-size: 18px;
        }

        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 32px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-teal);
        }

        .user-info {
            display: flex;
            align-items: center;
            background: white;
            padding: 8px 16px;
            border-radius: 30px;
            box-shadow: 0 2px 8px rgba(17, 88, 121, 0.1);
        }

        .user-info img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 12px;
            border: 2px solid var(--primary-blue);
        }

        .user-info .name {
            font-weight: 600;
            font-size: 16px;
            color: var(--primary-teal);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .stat-icon.students {
            background: rgba(252, 212, 10, 0.2);
            color: var(--primary-teal);
        }

        .stat-icon.grades {
            background: rgba(135, 171, 188, 0.2);
            color: var(--primary-teal);
        }

        .stat-icon.pending {
            background: rgba(231, 76, 60, 0.15);
            color: #c0392b;
        }

        .stat-info h3 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .stat-info p {
            color: var(--text-light);
            font-size: 14px;
        }

        .grades-container {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        .grades-header {
            padding: 24px 32px;
            background: var(--primary-teal);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .grades-header h3 {
            font-size: 22px;
            font-weight: 600;
        }

        .search-filter {
            display: flex;
            gap: 16px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 10px 16px 10px 40px;
            border: 2px solid var(--primary-blue);
            border-radius: 30px;
            font-size: 14px;
            width: 280px;
            background: white;
            color: var(--text-dark);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary-yellow);
            box-shadow: 0 0 0 3px rgba(252, 212, 10, 0.3);
        }

        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-teal);
        }

        .filter-select {
            padding: 10px 16px;
            border: 2px solid var(--primary-blue);
            border-radius: 30px;
            background: white;
            font-size: 14px;
            color: var(--text-dark);
            cursor: pointer;
            font-weight: 500;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--primary-yellow);
            box-shadow: 0 0 0 3px rgba(252, 212, 10, 0.3);
        }

        .grades-table {
            width: 100%;
            border-collapse: collapse;
        }

        .grades-table th {
            text-align: left;
            padding: 18px 32px;
            font-weight: 700;
            color: var(--primary-teal);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            background: rgba(135, 171, 188, 0.08);
        }

        .grades-table td {
            padding: 18px 32px;
            border-top: 1px solid var(--border);
            font-size: 16px;
            color: var(--text-medium);
        }

        .student-name {
            display: flex;
            align-items: center;
        }

        .student-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--primary-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-weight: 700;
            color: white;
            font-size: 18px;
        }

        .grade-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            display: inline-block;
        }

        .grade-1 { background: rgba(252, 212, 10, 0.2); color: var(--primary-teal); border: 1px solid var(--primary-yellow); }
        .grade-2 { background: rgba(135, 171, 188, 0.2); color: var(--primary-teal); border: 1px solid var(--primary-blue); }
        .grade-3 { background: rgba(17, 88, 121, 0.1); color: var(--primary-teal); border: 1px solid var(--primary-teal); }
        .grade-4 { background: rgba(255, 180, 0, 0.15); color: #d35400; border: 1px solid #f39c12; }
        .grade-5 { background: rgba(231, 76, 60, 0.15); color: #c0392b; border: 1px solid #e74c3c; }
        .grade-6 { background: rgba(142, 68, 173, 0.15); color: #6c3483; border: 1px solid #9b59b6; }
        .grade-7 { background: rgba(46, 204, 113, 0.15); color: #27ae60; border: 1px solid #2ecc71; }
        .grade-8 { background: rgba(52, 152, 219, 0.15); color: #2980b9; border: 1px solid #3498db; }
        .grade-9 { background: rgba(241, 196, 15, 0.15); color: #f39c12; border: 1px solid #f1c40f; }
        .grade-10 { background: rgba(230, 126, 34, 0.15); color: #d35400; border: 1px solid #e67e22; }

        .loading-message {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
            font-size: 16px;
        }

        .no-students {
            text-align: center;
            padding: 60px 40px;
            color: var(--text-light);
        }

        .no-students i {
            font-size: 64px;
            color: var(--primary-blue);
            margin-bottom: 16px;
        }

        .no-students h3 {
            font-size: 24px;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .no-students p {
            font-size: 16px;
        }

        .error-details {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 16px;
            border-radius: 12px;
            margin: 20px 32px;
            font-size: 14px;
            line-height: 1.6;
        }

        .error-details strong {
            display: block;
            margin-bottom: 8px;
        }

        @media (max-width: 992px) {
            .sidebar {
                width: 80px;
            }
            
            .logo h1, .nav-item span, .logout-btn span {
                display: none;
            }
            
            .logo {
                justify-content: center;
                padding: 0 0 24px;
            }
            
            .logo i {
                margin-right: 0;
            }
            
            .nav-item {
                justify-content: center;
                padding: 18px 0;
            }
            
            .nav-item i {
                margin-right: 0;
                font-size: 22px;
            }

            .logout-section {
                padding: 12px;
            }

            .logout-btn {
                padding: 14px;
                justify-content: center;
            }
            
            .main-content {
                margin-left: 80px;
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
            
            .search-filter {
                flex-direction: column;
                width: 100%;
            }
            
            .search-box input {
                width: 100%;
            }
            
            .grades-table th,
            .grades-table td {
                padding: 14px 16px;
                font-size: 14px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
       <div class="logo">
         <i class="fas fa-graduation-cap"></i>
         <h1>عالمي الرقمي</h1>
        </div>
        <div class="nav-links">
            <div class="nav-item active">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-users"></i>
                <span>Students</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-book"></i>
                <span>Courses</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-calendar-alt"></i>
                <span>Schedule</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </div>
        </div>
        
        <div class="logout-section">
            <button class="logout-btn" id="logout-btn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h2>Students Dashboard</h2>
            <div class="user-info">
                <img src="https://ui-avatars.com/api/?name=Teacher&background=115879&color=fff" alt="Teacher" id="teacher-avatar">
                <div class="name" id="teacher-name">Teacher</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon students">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-info">
                    <h3 id="total-students">0</h3>
                    <p>Total Students</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon grades">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div class="stat-info">
                    <h3 id="total-grades">10</h3>
                    <p>Grade Levels</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon pending">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="stat-info">
                    <h3 id="avg-grade">-</h3>
                    <p>Average Grade</p>
                </div>
            </div>
        </div>

        <div class="grades-container">
            <div class="grades-header">
                <h3>All Registered Students</h3>
                <div class="search-filter">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="Search students...">
                    </div>
                    <select class="filter-select" id="grade-filter">
                        <option value="all">All Grades</option>
                        <option value="1">Grade 1</option>
                        <option value="2">Grade 2</option>
                        <option value="3">Grade 3</option>
                        <option value="4">Grade 4</option>
                        <option value="5">Grade 5</option>
                        <option value="6">Grade 6</option>
                        <option value="7">Grade 7</option>
                        <option value="8">Grade 8</option>
                        <option value="9">Grade 9</option>
                        <option value="10">Grade 10</option>
                    </select>
                </div>
            </div>
            <div id="students-table-container">
                <div class="loading-message">
                    <i class="fas fa-spinner fa-spin" style="font-size: 32px; color: var(--primary-teal);"></i>
                    <p style="margin-top: 16px;">Loading students...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";
        import { collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";

        let allStudents = [];
        let filteredStudents = [];

        function getInitials(firstName, lastName) {
            const first = firstName ? firstName.charAt(0) : '';
            const last = lastName ? lastName.charAt(0) : '';
            return (first + last).toUpperCase() || '??';
        }

        function getGradeBadgeClass(grade) {
            return `grade-${grade || '1'}`;
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            } catch (e) {
                return 'N/A';
            }
        }

        function renderStudentsTable(students) {
            const container = document.getElementById('students-table-container');
            
            if (students.length === 0) {
                container.innerHTML = `
                    <div class="no-students">
                        <i class="fas fa-user-graduate"></i>
                        <h3>No Students Found</h3>
                        <p>There are no students registered yet or matching your search criteria.</p>
                    </div>
                `;
                return;
            }

            const tableHTML = `
                <table class="grades-table">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Email</th>
                            <th>Grade Level</th>
                            <th>Joined Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${students.map(student => `
                            <tr>
                                <td>
                                    <div class="student-name">
                                        <div class="student-avatar">${getInitials(student.firstName, student.lastName)}</div>
                                        <span>${student.firstName || 'Unknown'} ${student.lastName || 'Student'}</span>
                                    </div>
                                </td>
                                <td>${student.email || 'N/A'}</td>
                                <td><span class="grade-badge ${getGradeBadgeClass(student.grade)}">Grade ${student.grade || '1'}</span></td>
                                <td>${formatDate(student.createdAt)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            container.innerHTML = tableHTML;
        }

        async function loadStudents() {
            const container = document.getElementById('students-table-container');
            
            try {
                console.log('Loading students from Firestore...');
                
                const studentsSnapshot = await getDocs(collection(db, "users"));
                
                allStudents = [];
                studentsSnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    console.log('Student data:', data);
                    
                    if (data.userType === 'student' || !data.userType) {
                        allStudents.push({
                            id: docSnap.id,
                            firstName: data.firstName || 'Unknown',
                            lastName: data.lastName || 'Student',
                            email: data.email || 'N/A',
                            grade: data.grade || '1',
                            createdAt: data.createdAt || new Date().toISOString(),
                            userType: data.userType || 'student'
                        });
                    }
                });

                console.log(`Loaded ${allStudents.length} students`);
                
                document.getElementById('total-students').textContent = allStudents.length;
                
                if (allStudents.length > 0) {
                    const totalGrade = allStudents.reduce((sum, student) => {
                        return sum + (parseInt(student.grade) || 0);
                    }, 0);
                    const avgGrade = (totalGrade / allStudents.length).toFixed(1);
                    document.getElementById('avg-grade').textContent = avgGrade;
                } else {
                    document.getElementById('avg-grade').textContent = '-';
                }

                filteredStudents = [...allStudents];
                renderStudentsTable(filteredStudents);
                
            } catch (error) {
                console.error('Error loading students:', error);
                console.error('Error code:', error.code);
                console.error('Error message:', error.message);
                
                let errorHTML = `
                    <div class="no-students">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error Loading Students</h3>
                        <p>Failed to load student data. Please check the details below.</p>
                    </div>
                `;
                
                if (error.code === 'permission-denied') {
                    errorHTML += `
                        <div class="error-details">
                            <strong>Permission Denied</strong>
                            <p>Your Firestore security rules are blocking access to the students data.</p>
                            <p><strong>To fix this:</strong></p>
                            <ol style="margin-left: 20px; margin-top: 10px;">
                                <li>Go to Firebase Console → Firestore Database → Rules</li>
                                <li>Update your rules to allow teachers to read student data</li>
                                <li>Example rule:</li>
                            </ol>
                            <pre style="background: #f5f5f5; padding: 10px; border-radius: 4px; margin-top: 10px; overflow-x: auto;">
match /users/{userId} {
  allow read: if request.auth != null;
  allow write: if request.auth.uid == userId;
}</pre>
                        </div>
                    `;
                } else {
                    errorHTML += `
                        <div class="error-details">
                            <strong>Error Details:</strong>
                            <p>Code: ${error.code || 'Unknown'}</p>
                            <p>Message: ${error.message || 'Unknown error occurred'}</p>
                        </div>
                    `;
                }
                
                container.innerHTML = errorHTML;
            }
        }

        function filterStudents() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const gradeFilter = document.getElementById('grade-filter').value;

            filteredStudents = allStudents.filter(student => {
                const firstName = student.firstName || '';
                const lastName = student.lastName || '';
                const email = student.email || '';
                
                const matchesSearch = 
                    firstName.toLowerCase().includes(searchTerm) ||
                    lastName.toLowerCase().includes(searchTerm) ||
                    email.toLowerCase().includes(searchTerm);
                
                const matchesGrade = gradeFilter === 'all' || student.grade === gradeFilter;

                return matchesSearch && matchesGrade;
            });

            renderStudentsTable(filteredStudents);
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                console.log('User logged in:', user.email);
                
                try {
                    const teacherDoc = await getDoc(doc(db, "teachers", user.uid));
                    if (teacherDoc.exists()) {
                        const teacherData = teacherDoc.data();
                        const teacherName = `${teacherData.firstName} ${teacherData.lastName}`;
                        
                        document.getElementById('teacher-name').textContent = teacherName;
                        
                        const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(teacherName)}&background=115879&color=fff`;
                        document.getElementById('teacher-avatar').src = avatarUrl;
                        
                        await loadStudents();
                    } else {
                        console.log('User is not a teacher');
                        alert('Access denied. This page is only for teachers.');
                        window.location.href = './login.html';
                    }
                } catch (error) {
                    console.error('Error loading teacher data:', error);
                    alert('Error loading teacher profile. Please try again.');
                }
            } else {
                console.log('No user logged in');
                window.location.href = './login.html';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            const confirmLogout = confirm('Are you sure you want to logout?');
            if (confirmLogout) {
                try {
                    await signOut(auth);
                    console.log('User signed out successfully');
                    window.location.href = './landing_page.html';
                } catch (error) {
                    console.error('Error signing out:', error);
                    alert('Error signing out. Please try again.');
                }
            }
        });

        document.getElementById('search-input').addEventListener('input', filterStudents);
        document.getElementById('grade-filter').addEventListener('change', filterStudents);

        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', function() {
                navItems.forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Units - Taa Academy</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#115879">
  <link rel="stylesheet" href="toast-notifications.css">
  <link rel="stylesheet" href="loading-animations.css">
  <link rel="stylesheet" href="dark-mode.css">
  <link rel="stylesheet" href="print-styles.css" media="print">
  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  :root {
    --primary-blue: #115879;
    --primary-yellow: #fcd40a;
    --bg-gradient-start: #f8fafc;
    --bg-gradient-end: #e8f1f8;
    --card-shadow: 0 4px 12px rgba(17, 88, 121, 0.06);
    --card-shadow-hover: 0 16px 32px rgba(17, 88, 121, 0.18);
    --text-primary: #1e293b;
    --text-secondary: #64748b;
    --border-color: #e2e8f0;
    --locked-bg: #f1f5f9;
    --hover-bg: #f0f9ff;
    --focus-outline: 3px solid var(--primary-blue);
    --success-green: #10b981;
  }

  body {
    background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
    min-height: 100vh;
    color: var(--text-primary);
    padding: 2.5rem 2rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(17, 88, 121, 0.02) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(252, 212, 10, 0.02) 0%, transparent 40%);
    pointer-events: none;
    z-index: -1;
  }

  body[dir="rtl"] {
    font-family: 'Cairo', 'Tajawal', 'Segoe UI', system-ui, sans-serif;
  }

  .units-wrapper {
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .page-header {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeInUp 0.6s ease-out;
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .page-header h1 {
    font-size: 2.4rem;
    font-weight: 800;
    color: var(--primary-blue);
    margin-bottom: 0.6rem;
    text-shadow: 0 2px 4px rgba(17, 88, 121, 0.08);
  }

  .page-header p {
    font-size: 1.1rem;
    color: var(--text-secondary);
    line-height: 1.6;
    max-width: 600px;
    margin: 0 auto;
  }

  .back-btn,
  .lang-toggle {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.8rem 1.5rem;
    background: white;
    border: 2px solid var(--border-color);
    color: var(--text-secondary);
    border-radius: 16px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.06);
    white-space: nowrap;
  }

  .back-btn:hover,
  .lang-toggle:hover {
    background: var(--primary-blue);
    color: white;
    border-color: var(--primary-blue);
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(17, 88, 121, 0.25);
  }

  .back-btn:focus,
  .lang-toggle:focus {
    outline: var(--focus-outline);
    outline-offset: 2px;
  }

  .units-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2.2rem;
    animation: fadeIn 0.8s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .unit-card {
    background: white;
    border-radius: 24px;
    padding: 2rem;
    box-shadow: var(--card-shadow);
    border: 1px solid rgba(255, 255, 255, 0.7);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 220px;
    justify-content: center;
    text-align: center;
  }

  .unit-card.locked {
    background: var(--locked-bg);
    cursor: not-allowed;
    opacity: 0.9;
    transform: none !important;
    box-shadow: var(--card-shadow);
  }

  .unit-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 5px;
    background: linear-gradient(90deg, var(--primary-yellow), var(--primary-blue));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
    z-index: 1;
  }

  [dir="rtl"] .unit-card::before {
    transform-origin: right;
  }

  .unit-card:not(.locked):hover {
    transform: translateY(-10px);
    box-shadow: var(--card-shadow-hover);
    background: var(--hover-bg);
  }

  .unit-card:not(.locked):hover::before {
    transform: scaleX(1);
  }

  .unit-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--primary-yellow), #e6c009);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary-blue);
    font-weight: 800;
    font-size: 1.7rem;
    margin: 0 auto 1.4rem;
    box-shadow: 0 6px 16px rgba(252, 212, 10, 0.4);
    flex-shrink: 0;
    transition: all 0.3s ease;
  }

  .unit-card:not(.locked):hover .unit-icon {
    transform: scale(1.1) rotate(5deg);
    box-shadow: 0 10px 24px rgba(252, 212, 10, 0.6);
  }

  .unit-card.locked .unit-icon {
    background: #e2e8f0;
    color: #94a3b8;
    box-shadow: none;
    transform: none;
  }

  .lock-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 24px;
    opacity: 0;
    transition: opacity 0.3s ease, background 0.3s ease;
    z-index: 2;
  }

  .unit-card.locked .lock-overlay {
    opacity: 1;
  }

  .lock-icon {
    font-size: 2.2rem;
    color: #94a3b8;
  }

  .unit-card h3 {
    font-size: 1.45rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 0.9rem;
    line-height: 1.4;
    transition: color 0.3s ease;
  }

  .unit-card:not(.locked):hover h3 {
    color: var(--primary-blue);
  }

  .unit-card p {
    font-size: 0.98rem;
    color: var(--text-secondary);
    line-height: 1.65;
    transition: color 0.3s ease;
  }

  .unit-card:not(.locked):hover p {
    color: var(--text-primary);
  }

  @media (max-width: 900px) {
    .units-grid {
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    }
  }

  @media (max-width: 768px) {
    .units-grid {
      grid-template-columns: 1fr;
    }
    body {
      padding: 1.8rem 1.2rem;
    }
    .page-header h1 {
      font-size: 2rem;
    }
    .top-bar {
      flex-direction: column;
      align-items: stretch;
    }
    .back-btn,
    .lang-toggle {
      justify-content: center;
    }
  }

  @media (max-width: 480px) {
    .unit-card {
      padding: 1.6rem 1.4rem;
      min-height: 200px;
    }
    .page-header h1 {
      font-size: 1.8rem;
    }
    .page-header p {
      font-size: 1rem;
    }
    .unit-icon {
      width: 56px;
      height: 56px;
      font-size: 1.5rem;
    }
  }

  .unit-card:not(.locked):focus {
    outline: var(--focus-outline);
    outline-offset: 4px;
    z-index: 3;
  }

  .unit-card:not(.locked) {
    animation: subtlePulse 8s infinite alternate;
  }

  @keyframes subtlePulse {
    0%, 100% { box-shadow: var(--card-shadow); }
    50% { box-shadow: 0 6px 18px rgba(17, 88, 121, 0.1); }
  }
</style>
</head>

        }
      };

      const t = translations[currentLang];
      document.getElementById('backText').textContent = t.backText;
      document.getElementById('selectUnitText').textContent = t.selectUnitText;
      document.getElementById('langText').textContent = t.langText;
      document.getElementById('gradeTitle').textContent = t.gradeTitle;

      setLanguage(currentLang === 'en' ? 'ar' : 'en');

    function renderUnits() {
      const units = gradeUnits[grade] || gradeUnits['1'];
      const container = document.getElementById('unitsContainer');

      container.innerHTML = units.map((unit, index) => {
        const unlocked = isUnitUnlocked(grade, unit.id);
        const cardClass = unlocked ? '' : 'locked';
        const clickAction = unlocked 
          ? `window.location.href='lesson.html?grade=${grade}&unit=${unit.id}'` 
          : '';
        
        const title = typeof unit.title === 'object' ? unit.title[currentLang] : unit.title;
        const desc = typeof unit.desc === 'object' ? unit.desc[currentLang] : unit.desc;
        
        return `
          <div class="unit-card ${cardClass}" ${unlocked ? `onclick="${clickAction}"` : ''}>
            <div class="unit-icon">${index + 1}</div>
            <h3>${title}</h3>
            <p>${desc}</p>
            ${!unlocked ? `<div class="lock-overlay"><i class="fas fa-lock lock-icon"></i></div>` : ''}
          </div>
        `;
      }).join('');
    }

    setLanguage(currentLang);

    // Update dark mode icon
    window.addEventListener('darkModeChanged', (e) => {
      const icon = document.getElementById('dark-mode-icon');
      if (icon) {
        icon.className = e.detail.isDark ? 'fas fa-sun' : 'fas fa-moon';
      }
    });
    // Initialize dark mode icon
    if (document.getElementById('dark-mode-icon')) {
      document.getElementById('dark-mode-icon').className = darkMode.isEnabled() ? 'fas fa-sun' : 'fas fa-moon';
    }
  </script>
